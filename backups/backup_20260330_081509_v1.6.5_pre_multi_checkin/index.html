<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Controle de Abastecimento</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00bcc1">
    <script>
        window.onerror = function (msg, url, lineNo, columnNo, error) {
            console.error('ERRO:', msg, url, lineNo);
            return false;
        };
        window.addEventListener("unhandledrejection", function (event) {
            const reason = event.reason ? String(event.reason) : "";
            // Ignora falhas de Service Worker silenciosamente
            if (reason.includes("ServiceWorker") || reason.includes("Service Worker") || reason.includes("SW update")) {
                console.warn('Silent SW rejection:', event.reason);
                return;
            }
            console.error('ERRO ASYNC:', event.reason);
        });
    </script>
</head>

<body>
    <script>
        // FORÇA DESINSTALAÇÃO DE SERVICE WORKERS (Correção de Tela Branca / Cache)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let registration of registrations) {
                    registration.unregister();
                }
            });
        }
        if ('caches' in window) {
            caches.keys().then(function(names) {
                for (let name of names) caches.delete(name);
            });
        }
    </script>
    <!-- v1.6.5 (Sem Bug de SW) -->
    <div id="app">
        <div class="loading-screen">
            <div class="spinner"></div>
            <p>Carregando sistema...</p>
        </div>
    </div>

    <!-- Firebase SDK v8 (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <!-- ExcelJS substitui SheetJS para permitir fotos -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <!-- html2canvas para captura de tela -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <!-- Script principal limpo na versão 1.6.5 -->
    <script src="app.js"></script>
</body>

</html>
